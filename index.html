<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 24px;
    }
    h1 { color: #38bdf8; font-size: 1.4rem; }
    p { color: #64748b; font-size: 0.9rem; text-align: center; }

    .btn {
      padding: 18px 32px;
      background: #0284c7;
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>QR Scanner</h1>
  <p>Klik tombol untuk membuka scanner</p>

  <a class="btn" href="https://github.com/mil-98/fixgym-kasir" target="_blank">
    📷 Scan QR
  </a>
</body>
</html>
